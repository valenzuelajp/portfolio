                <h2>Tech Stack</h2>
                <div class="tech-grid">
                    <div class="tech-item animate-on-scroll stagger-1">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"

                    </div>
                    <div class="tech-item animate-on-scroll stagger-2">

                        <span>CSS3</span>
                    </div>
                    <div class="tech-item animate-on-scroll stagger-3">

                    </div>
                    <div class="tech-item animate-on-scroll stagger-4">

                    </div>

                            alt="JavaScript">
                        <span>JavaScript</span>
                    </div>
                    <div class="tech-item animate-on-scroll stagger-8">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"
                            alt="Node.js">
                        <span>Node.js</span>
