    <!-- SCROLL ANIMATION LOGIC -->
    <style>
        .swal-uniform-img {
            object-fit: contain !important;
            aspect-ratio: 1 / 1 !important;
        }
    </style>
    <script>
        function showCert(imageSrc, altText, verifyLink) {
            Swal.fire({
                imageUrl: imageSrc,
                imageAlt: altText,
                imageWidth: 350,
                imageHeight: 350,
                background: 'transparent',
                backdrop: 'rgba(0,0,0,0.8)',
                showCancelButton: true,
                confirmButtonText: 'Verify on Credly',
                confirmButtonColor: '#643cf0',
                cancelButtonColor: '#333333',
                cancelButtonText: 'Close',
                customClass: {
                    image: 'swal-uniform-img'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open(verifyLink, '_blank');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Intersection Observer for scroll reveals
            const observerOptions = {
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('[class*="reveal"]').forEach(el => {
                observer.observe(el);
            });

        });
    </script>
