<head>

        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: { preflight: false }
        }
    </script>
    <link rel="stylesheet" href="styles/portfolio.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/portfolio.js" defer></script>
    <title>Jhon Paul Valenzuela | Certifications</title>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">JP</a>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="tech-stack.html">Tech Stack</a></li>
            <li><a href="certifications.html">Certifications</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- CERTIFICATIONS SECTION -->
    <div class="full-page-section-layout" id="section-certifications">
        <div class="main-content-layout">
            <div class="descriptive-content-area reveal-left">
                <h2>Certifications</h2>
                <p class="cert-instruction">Click on a certification to view details and the official badge.</p>
                <div class="cert-grid">
                    <div class="cert-item animate-on-scroll stagger-1" style="cursor: pointer;"
                        onclick="showCert('images/phyton.png', 'Python Essentials 1', 'https://www.credly.com/badges/d3fe8705-f262-4bc3-a044-9acb3eac7258/public_url')">
                        <img src="images/phyton.png" alt="Python Essentials 1">
                        <span>Python Essentials 1</span>
                        <button class="cert-view-btn">View Badge</button>
                    </div>
                    <div class="cert-item animate-on-scroll stagger-2" style="cursor: pointer;"
                        onclick="showCert('images/esssential.png', 'Cybersecurity Essentials', 'https://www.credly.com/badges/e5daf322-a28c-4a4f-9eaa-f9f048cfa7b4/public_url')">
                        <img src="images/esssential.png" alt="Cybersecurity Essentials">
                        <span>Cybersecurity Essentials</span>
                        <button class="cert-view-btn">View Badge</button>
                    </div>
                    <div class="cert-item animate-on-scroll stagger-3" style="cursor: pointer;"
                        onclick="showCert('images/Introduction to Cybersecurity.png', 'Introduction to Cybersecurity', 'https://www.credly.com/badges/c6a4fe0b-3736-4fb6-b07f-304d1b4cccac/public_url')">
                        <img src="images/Introduction to Cybersecurity.png" alt="Introduction to Cybersecurity">
                        <span>Introduction to Cybersecurity</span>
                        <button class="cert-view-btn">View Badge</button>
                    </div>
                    <div class="cert-item animate-on-scroll stagger-4" style="cursor: pointer;"
                        onclick="showCert('images/html css.png', 'IT Specialist - HTML and CSS', 'https://www.credly.com/badges/0021d3d6-807f-471f-a63b-417fe72b543e/public_url')">
                        <img src="images/html css.png" alt="IT Specialist - HTML and CSS">
                        <span>IT Specialist - HTML and CSS</span>
                        <button class="cert-view-btn">View Badge</button>
                    </div>
                    <div class="cert-item animate-on-scroll stagger-5" style="cursor: pointer;"
                        onclick="showCert('images/osb.png', 'Operating Systems Basics', 'https://www.credly.com/badges/3bb06096-079b-4456-a86e-c0e7dcd68211/public_url')">
                        <img src="images/osb.png" alt="Operating Systems Basics">
                        <span>Operating Systems Basics</span>
                        <button class="cert-view-btn">View Badge</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCROLL ANIMATION LOGIC -->
    <style>
        .swal-uniform-img {
            object-fit: contain !important;
            aspect-ratio: 1 / 1 !important;
            width: 100% !important;
            max-width: 350px !important;
            height: auto !important;
            margin: 0 auto !important;
        }
    </style>
</body>

</html>
